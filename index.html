<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Cat Blasterz</title>
        <link rel="stylesheet" href="/assets/styles/main.css">
        <link rel="stylesheet" href="/assets/styles/game.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="/assets/scripts/game.js" defer type="module"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>

    <body>

        <div id="canvas-container" class="game-container">

        </div>

        <div class="page-content">
            <main>
                <section class="topbar">
                    <h1>Cat Blasterz</h1>
                    <h2>The ULTIMATE Aim Trainer</h2>
                </section>

                <section class="play-section">
                    <img class="showcase-item" src="/assets/images/game-screenshot.png" alt="A screenshot of the game, where the crosshair is pointed at two cats">
                    <div>
                        <h2>Play Cat Blasterz</h2>
                        <br>
                        <p>Currently Selected: Endless (HARD)</p>
                        <br>
                        <button type="button" id="play-button" onclick="startGame()">PLAY THE GAME</button>
                        <!-- <button type="button" id="settings-button"><i class="fa-solid fa-gear"></i></button> -->
                    </div>
                </section>

                <section class="settings-section">
                    <div>
                        <h2>Change Settings</h2>
                        <br>
                        <div>
                            <p>Display Lyrics</p>
                            <input type="checkbox" id="lyricsCensored">
                        </div>
                        <br>
                        <div>
                            <p>Censored Lyrics</p>
                            <input type="checkbox" id="lyricsCensored">
                        </div>
                    </div>
                </section>
            </main>
        </div>


    </body>
</html>
